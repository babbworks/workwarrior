name: Workwarrior Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ── Strict gate ─────────────────────────────────────────────────────────────
  # Sync engine tests must be clean on every supported platform.
  # This job blocks merge if any test fails.
  sync-engine:
    name: Sync Engine (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install bats-core jq

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bats jq

      - name: Run sync engine tests
        run: bats tests/test-github-sync.bats tests/test-sync-state.bats

  # ── Informational ────────────────────────────────────────────────────────────
  # Full BATS suite across all test files. Does not block merge.
  # ~33 baseline failures are pre-existing and tracked in tests/CLAUDE.md.
  # As baseline failures are fixed, move those test files into the strict gate above.
  full-suite:
    name: Full BATS Suite
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bats jq taskwarrior

      - name: Run full suite
        run: bats --tap tests/ 2>&1 | tee bats-results.tap; exit 0

      - name: Upload TAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bats-results-${{ github.sha }}
          path: bats-results.tap
          retention-days: 14
