version: 1
description: >
  Authoritative registry of service-managed UDAs. These fields are created and
  maintained by external service integrations. Do not rename or delete them —
  doing so will break sync. ww profile uda list marks these with service badges
  and groups them under their service section.

services:
  bugwarrior:
    description: "UDAs created by bugwarrior for external issue tracker sync (one-way pull)"
    prefix_patterns:
      - "github_*"
      - "gitlab_*"
      - "jira_*"
      - "trello_*"
      - "bw_*"
    known_udas:
      - name: github_number
        label: "GitHub Issue #"
        type: numeric
      - name: github_repo
        label: "GitHub Repo"
        type: string
      - name: github_url
        label: "GitHub URL"
        type: string
      - name: github_title
        label: "GitHub Title"
        type: string
      - name: github_state
        label: "GitHub State"
        type: string
      - name: github_user
        label: "GitHub Author"
        type: string
      - name: github_milestone
        label: "GitHub Milestone"
        type: string
      - name: github_project
        label: "GitHub Project"
        type: string
      - name: github_namespace
        label: "GitHub Namespace"
        type: string
      - name: github_type
        label: "GitHub Type"
        type: string
      - name: github_labels
        label: "GitHub Labels"
        type: string
      - name: github_created_at
        label: "GitHub Created"
        type: date
      - name: github_updated_at
        label: "GitHub Updated"
        type: date
      - name: github_closed_at
        label: "GitHub Closed"
        type: date
      - name: github_body
        label: "GitHub Body"
        type: string

  github-sync:
    description: "UDAs used by ww bidirectional GitHub sync engine"
    known_udas:
      - name: sync_id
        label: "Sync Issue ID"
        type: numeric
      - name: sync_repo
        label: "Sync Repo"
        type: string
      - name: sync_state
        label: "Sync State"
        type: string
      - name: sync_last
        label: "Last Synced"
        type: date
      - name: sync_url
        label: "Issue URL"
        type: string

extensions:
  twdensity:
    description: "UDAs added by TWDensity — due-date density urgency scoring"
    upstream: "https://github.com/00sapo/TWDensity"
    upstream_author: "00sapo · MIT License"
    install: "pipx install twdensity"
    known_udas:
      - name: density
        label: "Due Density"
        type: numeric
        notes: "Count of tasks with similar due dates — drives urgency coefficient"
      - name: densitywindow
        label: "Density Window"
        type: numeric
        default: 5
        notes: "Window size in days for density calculation"

  taskcheck:
    description: "UDAs added by taskcheck — automatic task scheduler"
    upstream: "https://github.com/00sapo/taskcheck"
    upstream_author: "00sapo · MIT License"
    install: "pipx install taskcheck"
    known_udas:
      - name: estimated
        label: "Estimated Hours"
        type: numeric
        notes: "Expected hours to complete the task — used by taskcheck scheduler"
      - name: time_map
        label: "Time Map"
        type: string
        notes: "Working hours map key (e.g. work, weekend) — defined in taskcheck.toml"
