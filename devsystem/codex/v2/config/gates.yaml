gates:
  A:
    name: acceptance_required
    rule: "No implementation without explicit acceptance criteria"
  B:
    name: verification_required
    rule: "No merge with failing required tests or unresolved high-severity findings"
  C:
    name: docs_help_parity
    rule: "No completion claim unless docs and CLI help match behavior"
  D:
    name: release_checklist
    rule: "No release-ready claim with unchecked critical checklist items"
  E:
    name: tracked_todos_only
    rule: "No untracked TODO/placeholder in production code paths"

