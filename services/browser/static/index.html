<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ww · workwarrior</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <span class="wordmark-ww">ww</span>
        <span class="wordmark-full">workwarrior</span>
      </div>
      <div class="profile-pill" id="profile-pill">—</div>
      <ul class="profile-switcher hidden" id="profile-switcher"></ul>
      <nav class="sidebar-nav">
        <button class="nav-item active" data-section="tasks">Tasks</button>
        <button class="nav-item" data-section="time">Time</button>
        <button class="nav-item" data-section="journal">Journal</button>
        <button class="nav-item" data-section="ledger">Ledger</button>
      </nav>
      <button class="sidebar-toggle" id="sidebar-toggle" title="Toggle sidebar">‹</button>
    </aside>
    <div id="main">
      <header class="content-header">
        <span id="section-title">Tasks</span>
        <div class="header-right">
          <span id="header-profile">—</span>
          <span class="conn-dot" id="conn-dot" title="disconnected"></span>
        </div>
      </header>
      <div id="content-area">
        <section class="section" id="section-tasks">
          <div class="section-toolbar">
            <input type="text" id="task-filter" class="inline-filter" placeholder="filter tasks…" />
            <button class="btn-add" id="btn-add-task">+ Add task</button>
          </div>
          <form class="add-form hidden" id="add-task-form">
            <input type="text" name="description" placeholder="Description*" required />
            <input type="text" name="project" placeholder="Project" />
            <input type="text" name="tags" placeholder="Tags (comma-sep)" />
            <select name="priority"><option value="">Priority</option><option>H</option><option>M</option><option>L</option></select>
            <input type="date" name="due" />
            <button type="submit">Add</button>
            <button type="button" class="btn-cancel">Cancel</button>
          </form>
          <div class="task-list" id="task-list">
            <div class="skeleton-msg">Loading tasks…</div>
          </div>
        </section>
        <section class="section hidden" id="section-time">
          <div class="time-today" id="time-today">Loading…</div>
          <div class="time-week" id="time-week"></div>
          <div class="time-intervals" id="time-intervals"></div>
        </section>
        <section class="section hidden" id="section-journal">
          <div class="section-toolbar">
            <button class="btn-add" id="btn-add-journal">+ New entry</button>
          </div>
          <form class="add-form hidden" id="add-journal-form">
            <textarea name="entry" placeholder="Write your entry…" rows="4" required></textarea>
            <button type="submit">Add</button>
            <button type="button" class="btn-cancel">Cancel</button>
          </form>
          <div class="journal-list" id="journal-list">
            <div class="skeleton-msg">Loading journal…</div>
          </div>
        </section>
        <section class="section hidden" id="section-ledger">
          <div class="section-toolbar">
            <button class="btn-add" id="btn-add-ledger">+ Add transaction</button>
          </div>
          <form class="add-form hidden" id="add-ledger-form">
            <input type="date" name="date" />
            <input type="text" name="description" placeholder="Description*" required />
            <input type="text" name="account" placeholder="Account (e.g. expenses:food)" />
            <input type="text" name="amount" placeholder="Amount (e.g. 25.00)" />
            <button type="submit">Add</button>
            <button type="button" class="btn-cancel">Cancel</button>
          </form>
          <div class="ledger-balances" id="ledger-balances"></div>
          <div class="ledger-recent" id="ledger-recent"></div>
        </section>
      </div>
    </div>
  </div>
  <!-- Terminal line -->
  <div id="terminal-bar">
    <div id="cmd-output" class="hidden"></div>
    <div id="hints-bar">type a ww command — tab to filter mode</div>
    <div id="terminal-input-row">
      <span id="term-prompt" class="prompt-exec">❯ </span>
      <input type="text" id="term-input" autocomplete="off" spellcheck="false" />
    </div>
  </div>
  <script src="/app.js"></script>
</body>
</html>
