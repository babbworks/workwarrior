# ─────────────────────────────────────────────────────────────────────────────
# bookbuilder / system / taxonomy.yaml
#
# The primary classification schema for all ingested items.
#
# HOW IT WORKS
#   Every item gets:
#     categories[]    — one or more paths from this file  (e.g. "ai_ml/ai_tools")
#     tech_refs{}     — cross-cutting tech extraction (see TECH STACK section)
#
#   An item can belong to multiple categories (e.g. a tweet about using Rust
#   for a local LLM tool would get  ai_ml/ai_infra  +  tech_refs.languages: Rust).
#
# EDITING
#   - Add new subcategories freely; the pipeline will pick them up on next run.
#   - The `keywords` list seeds the AI classifier — add domain terms you know.
#   - The `tech_stack` section is special: do not delete it or its subcategories.
#     The pipeline extracts tech_refs separately from primary classification.
#   - Auto-discovered clusters live in system/clusters.json — don't edit that by hand.
#
# VERSION
#   Bump `version` whenever you make a structural change (not just adding keywords).
# ─────────────────────────────────────────────────────────────────────────────

version: "1.0"
updated: "2026-04-06"

categories:

  # ── TECH STACK (SPECIAL) ────────────────────────────────────────────────────
  # Cross-cutting: any item mentioning a tool/package/repo/language gets a
  # tech_refs block in its analysis regardless of primary category.
  # Items can ALSO be primarily classified here when tech is the main subject.
  tech_stack:
    label: "Tech Stack"
    description: >
      Tools, packages, repos, programming languages, frameworks, hardware,
      and developer platforms. High-priority classification — the pipeline
      runs a dedicated tech-extraction pass on every item.
    priority: high
    subcategories:
      languages:
        label: "Programming Languages"
        keywords: [python, rust, typescript, javascript, go, swift, zig, c++, julia, ruby, elixir, kotlin, scala]
        examples: [Python, Rust, TypeScript, Go, Swift, Zig, "C++"]
      frameworks:
        label: "Frameworks & Libraries"
        keywords: [react, nextjs, fastapi, pytorch, tensorflow, jax, langchain, llamaindex, tailwind, svelte, django, flask, axum, tokio]
        examples: [React, FastAPI, PyTorch, LangChain, Tailwind]
      devtools:
        label: "Dev Tools & Environments"
        keywords: [cursor, neovim, vim, vscode, docker, kubernetes, git, github actions, ci/cd, terminal, cli, shell, zsh, tmux, warp]
        examples: [Cursor, Neovim, Docker, "GitHub Actions", Warp]
      repos:
        label: "Repos & Packages"
        description: "Specific GitHub repos, npm/pip/cargo/brew packages"
        keywords: [github.com, open source, open-source, package, library, crate, npm, pip, brew, cargo, pypi]
        examples: ["owner/repo", "pip install X", "npm i X"]
      hardware:
        label: "Hardware & Silicon"
        keywords: [apple silicon, m1, m2, m3, m4, h100, a100, gpu, tpu, npu, nvidia, amd, arm, risc-v, raspberry pi]
        examples: ["Apple Silicon", "M4 Max", "H100", TPU]
      platforms:
        label: "Platforms & Cloud Services"
        keywords: [github, vercel, cloudflare, aws, gcp, azure, hugging face, replicate, fly.io, railway, supabase, neon, modal]
        examples: [GitHub, Vercel, Cloudflare, "Hugging Face"]
      apps:
        label: "Apps & Products"
        keywords: [obsidian, raycast, arc, linear, notion, figma, replit, cursor, perplexity, claude, chatgpt]
        examples: [Obsidian, Raycast, Arc, Linear, Replit]

